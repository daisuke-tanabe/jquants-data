name: Monthly Data Update

on:
  schedule:
    - cron: '0 0 1 * *'  # UTC 00:00 = JST 09:00 毎月1日
  workflow_dispatch:       # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Download new data
        run: pnpm update
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}

      - name: Commit new CSV files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update data $(date +'%Y-%m')"
          git push
